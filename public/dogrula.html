<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifika Doğrulama Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="bg-green-600 p-6 text-center">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Doğrulanmış Sertifika</h1>
            <p class="text-green-100 text-sm mt-1">Bu belgenin orijinalliği sistem tarafından onaylanmıştır.</p>
        </div>

        <!-- Content -->
        <div class="p-6 space-y-4" id="cert-details">
            <div class="text-center py-4 text-slate-500 text-sm">
                <svg class="animate-spin h-6 w-6 text-green-600 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Doğrulanıyor...
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-xs text-slate-400">ProCertify Doğrulama Sistemi Altyapısı</p>
        </div>
    </div>

    <script>
        // Use URL query parameters to get data. e.g. ?id=PRC-12345
        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const container = document.getElementById('cert-details');
            
            let searchStr = decodeURIComponent(window.location.search.substring(1));
            
            if (!searchStr) {
                showError("Geçersiz Kod", "Bu QR kod herhangi bir doğrulama verisi içermiyor.");
                return;
            }

            // Basic HTML escape function to prevent XSS
            function escapeHtml(unsafe) {
                return (unsafe || "").toString()
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            }

            function showError(title, message) {
                container.innerHTML = `
                    <div class="text-center py-6">
                        <svg class="w-12 h-12 text-red-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <h2 class="text-lg font-bold text-slate-800">${title}</h2>
                        <p class="text-sm text-slate-500 mt-2">${message}</p>
                    </div>
                `;
                const header = document.querySelector('.bg-green-600');
                if (header) header.classList.replace('bg-green-600', 'bg-red-600');
                const icon = document.querySelector('.text-green-600');
                if (icon) icon.classList.replace('text-green-600', 'text-red-600');
            }
            
            function renderItems(fields) {
                let htmlContent = '';
                for (const [key, value] of Object.entries(fields)) {
                    let safeKey = escapeHtml(key);
                    const label = safeKey.charAt(0).toUpperCase() + safeKey.slice(1);
                    const safeValue = escapeHtml(value);
                    
                    htmlContent += `
                        <div class="flex flex-col border-b border-slate-100 pb-3 last:border-0 last:pb-0">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${label}</span>
                            <span class="text-md font-medium text-slate-800">${safeValue}</span>
                        </div>
                    `;
                }
                container.innerHTML = htmlContent;
            }

            // Check if it's an ID-based verification
            // Could be ?id=PRC-12345 or just ?PRC-12345
            let certId = urlParams.get('id');
            if (!certId && !searchStr.includes('=') && (searchStr.startsWith('PRC-') || /^[^\s&]{5,20}$/.test(searchStr))) {
                certId = searchStr;
            }

            if (certId) {
                try {
                    const res = await fetch('/api/verify/' + encodeURIComponent(certId));
                    if (res.ok) {
                        const data = await res.json();
                        
                        let htmlContent = `
                            <div class="bg-green-50 rounded-lg p-3 border border-green-100 mb-4 text-center">
                                <span class="text-xs font-bold text-green-600 uppercase">Sertifika ID</span>
                                <div class="text-lg font-mono text-green-800 tracking-wider">${escapeHtml(data.serialNo)}</div>
                            </div>
                        `;
                        
                        // Render fields
                        for (const [key, value] of Object.entries(data.fields || {})) {
                            let safeKey = escapeHtml(key);
                            const label = safeKey.charAt(0).toUpperCase() + safeKey.slice(1);
                            const safeValue = escapeHtml(value);
                            htmlContent += `
                                <div class="flex flex-col border-b border-slate-100 pb-3 mb-3 last:border-0 last:pb-0 last:mb-0">
                                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${label}</span>
                                    <span class="text-md font-medium text-slate-800">${safeValue}</span>
                                </div>
                            `;
                        }
                        
                        if (data.projects && Array.isArray(data.projects)) {
                            htmlContent += `
                                <div class="flex flex-col pt-3 border-t border-slate-100 mt-3">
                                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Onaylanan Eğitimler/Belgeler</span>
                                    <div class="flex flex-wrap gap-2">
                                        ${data.projects.map(p => `<span class="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-md border border-slate-200">${escapeHtml(p)}</span>`).join('')}
                                    </div>
                                </div>
                            `;
                        }
                        
                        if (data.date) {
                            htmlContent += `
                                <div class="flex flex-col pt-3 mt-3 text-center">
                                    <span class="text-xs text-slate-400">Veriliş: ${new Date(data.date).toLocaleString('tr-TR')}</span>
                                </div>
                            `;
                        }

                        container.innerHTML = htmlContent;
                        return;
                    } else {
                        showError("Sertifika Bulunamadı", "Sistemde böyle bir sertifika kaydı bulunmamaktadır. Seri numarasını (Örn: PRC-123456) kontrol edin.");
                        return;
                    }
                } catch (e) {
                    showError("Bağlantı Hatası", "Sunucu ile iletişim kurulamadı.");
                    return;
                }
            }

            // Legacy fallback for explicit parameters
            if (searchStr.includes('=')) {
                let fields = {};
                for (const [key, value] of urlParams.entries()) {
                    let safeKey = key;
                    if (safeKey.endsWith(':')) safeKey = safeKey.slice(0, -1);
                    fields[safeKey] = value;
                }
                renderItems(fields);
            } else {
                // Not standard "x=y" format. It's just a raw string payload.
                const safePayload = escapeHtml(searchStr).replace(/\\n/g, '<br/>');
                container.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">DOĞRULAMA BİLGİSİ</span>
                        <div class="text-sm font-medium text-slate-800 bg-slate-50 p-4 rounded-lg border border-slate-100 leading-relaxed whitespace-pre-wrap">${safePayload}</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
